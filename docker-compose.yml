services:
  db:
    image: mysql:8.0
    container_name: solar_mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-solar_tpc}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-your_prod_password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./solar_tpc_server
      dockerfile: Dockerfile
    container_name: solar_backend
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=${DB_HOST:-160.250.26.51}
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-solar_tpc}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-your_prod_password}
      - UPLOAD_PRODUCT_DIR=${UPLOAD_PRODUCT_DIR:-/app/upload/images/products}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "8080:8080"
    volumes:
      # Bind mount: ánh xạ thư mục upload trên host vào container với CÙNG đường dẫn.
      # Lý do: UPLOAD_PRODUCT_DIR=/root/solar-tpcgr là đường dẫn Spring Boot dùng để ghi file.
      # Nginx trên host serve location /uploads/ -> alias /root/solar-tpcgr/
      # Hai bên phải trỏ cùng 1 thư mục vật lý trên host.
      - ${UPLOAD_PRODUCT_DIR:-/root/solar-tpcgr}:${UPLOAD_PRODUCT_DIR:-/root/solar-tpcgr}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./solar_tpc_client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    container_name: solar_frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  admin:
    build:
      context: ./solar_tpc_admin
      dockerfile: Dockerfile
    container_name: solar_admin
    restart: always
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  db_data:
