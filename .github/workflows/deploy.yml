name: Deploy to Server

on:
  push:
    branches:
      - main # Chạy luồng này mỗi khi có code mới được push lên nhánh main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Kết nối SSH tới Server và thực thi lệnh Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "Đang triển khai phiên bản mới..."
            
            # Di chuyển tới thư mục chứa code trên server (Bạn cần thay đổi đường dẫn này cho đúng)
            cd /root/solar-tpcgr
            
            # Kéo code mới nhất từ Github về Server và cập nhật các submodules
            git pull origin main
            git submodule update --init --recursive
            
            # Tạo file .env chứa cấu hình từ GitHub Secrets và Variables
            echo "DB_NAME=${{ secrets.DB_NAME }}" > .env
            echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
            echo "UPLOAD_PROJECT_DIR=${{ secrets.UPLOAD_PROJECT_DIR }}" >> .env
            echo "NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}" >> .env
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
            
            # Build từng service tuần tự để tránh quá tải RAM trên VPS (Sequential Build)
            echo "Đang build cơ sở dữ liệu..."
            docker compose build db
            
            echo "Đang build backend Java..."
            docker compose build backend
            
            echo "Đang build frontend Next.js..."
            docker compose build frontend
            
            echo "Đang build admin Vue..."
            docker compose build admin
            
            # Sau khi build xong, extract dist files từ image ra host filesystem
            # Nginx của host sẽ serve trực tiếp từ /var/www/tpcsolar/admin/
            echo "Đang cập nhật static files cho Admin..."
            mkdir -p /var/www/tpcsolar/admin
            # Tạo container tạm để copy files (không cần chạy)
            docker create --name temp_admin_extract solar-tpcgr-admin:latest
            # Copy toàn bộ dist từ container ra host
            docker cp temp_admin_extract:/usr/share/nginx/html/. /var/www/tpcsolar/admin/
            # Xóa container tạm
            docker rm temp_admin_extract
            echo "Cập nhật static files Admin hoàn tất!"
            
            echo "Khởi chạy tất cả các container..."
            # Dùng --force-recreate để đảm bảo backend và frontend luôn
            # khởi động lại với image mới nhất sau khi build
            docker compose up -d --force-recreate --remove-orphans
            
            # Dọn dẹp các images không còn sử dụng để giải phóng dung lượng (Tùy chọn)
            docker image prune -f
            
            echo "Triển khai thành công rực rỡ! 🚀"
