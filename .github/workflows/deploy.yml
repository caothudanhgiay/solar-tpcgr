name: Deploy to Server

on:
  push:
    branches:
      - main # Chạy luồng này mỗi khi có code mới được push lên nhánh main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Kết nối SSH tới Server và thực thi lệnh Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "Đang triển khai phiên bản mới..."
            
            # Di chuyển tới thư mục chứa code trên server (Bạn cần thay đổi đường dẫn này cho đúng)
            cd /root/solar-tpcgr
            
            # Kéo code mới nhất từ Github về Server
            git pull origin main
            
            # Tạo file .env chứa cấu hình từ GitHub Secrets và Variables
            echo "DB_NAME=${{ secrets.DB_NAME }}" > .env
            echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}" >> .env
            
            # Build và khởi chạy các container (Frontend, Backend, Database) bằng docker compose
            docker compose up --build -d
            
            # Dọn dẹp các images không còn sử dụng để giải phóng dung lượng (Tùy chọn)
            docker image prune -f
            
            echo "Triển khai thành công rực rỡ! 🚀"
